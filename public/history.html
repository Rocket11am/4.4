<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日学习助手 | 学习记录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <header class="site-header site-shell">
    <a class="brand" href="/">
      <span class="brand-kicker">&gt; history center</span>
      <strong>每日学习助手</strong>
    </a>
    <nav class="nav-row">
      <a class="nav-link" href="/">首页</a>
      <a class="nav-link" data-email-link="/today" href="/today">今日学习</a>
      <a class="nav-link" data-email-link="/history" href="/history">学习记录</a>
      <a class="nav-link" data-email-link="/settings" href="/settings">设置</a>
    </nav>
  </header>

  <main class="main site-shell">
    <section id="history-empty" class="card center-note" hidden>
      <h1 class="section-title">暂无记录</h1>
      <p class="muted">先去设置页保存学习偏好并发送今日学习内容。</p>
      <p><a class="btn" href="/settings"><span>去设置</span></a></p>
    </section>

    <section id="history-content" hidden>
      <article class="card" style="margin-bottom:12px;">
        <p class="tiny">&gt; overview</p>
        <h1 class="terminal-title">学习记录</h1>
        <div class="stat-grid">
          <div class="stat-item"><span>连续学习</span><b id="stat-streak">0</b></div>
          <div class="stat-item"><span>累计学习天数</span><b id="stat-days">0</b></div>
          <div class="stat-item"><span>完成率</span><b id="stat-completion">0%</b></div>
          <div class="stat-item"><span>复习正确率</span><b id="stat-accuracy">0%</b></div>
        </div>
      </article>

      <article class="card" style="margin-bottom:12px;">
        <h2 class="section-title">最近 7 天趋势</h2>
        <div class="trend-shell">
          <div id="timeline" class="timeline"></div>
          <div id="accuracy-chart" class="accuracy-chart"></div>
        </div>
      </article>

      <section class="card history-panel-card" style="margin-bottom:12px;">
        <div class="panel-switch" role="tablist" aria-label="record panels">
          <button id="history-tab-records" class="btn btn-alt is-active" type="button" role="tab" aria-selected="true" aria-controls="history-records-panel">
            <span>历史记录</span>
          </button>
          <button id="history-tab-wrongbook" class="btn btn-alt" type="button" role="tab" aria-selected="false" aria-controls="history-wrongbook-panel">
            <span>错题本</span>
          </button>
        </div>
      </section>

      <section id="history-records-panel" class="history-shell" role="tabpanel" aria-labelledby="history-tab-records">
        <article class="card">
          <h2 class="section-title">历史列表</h2>
          <div id="session-list" class="list"></div>
        </article>
        <article class="card">
          <h2 class="section-title">记录详情</h2>
          <div id="session-detail" class="list"></div>
        </article>
      </section>

      <section id="history-wrongbook-panel" class="card" role="tabpanel" aria-labelledby="history-tab-wrongbook" hidden>
        <h2 class="section-title">错题本</h2>
        <div id="wrongbook-list" class="list"></div>
      </section>
    </section>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/history.js"></script>
</body>
</html>
