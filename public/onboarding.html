<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>每日学习助手 | 首次配置</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/pages.css">
</head>
<body>
  <header class="site-header site-shell">
    <a class="brand" href="/">
      <span class="brand-kicker">&gt; first setup</span>
      <strong>每日学习助手</strong>
    </a>
    <nav class="nav-row">
      <a class="nav-link" href="/">首页</a>
      <a class="nav-link" href="/onboarding">首次配置</a>
      <a class="nav-link" data-email-link="/today" href="/today">今日学习</a>
      <a class="nav-link" data-email-link="/settings" href="/settings">设置</a>
    </nav>
  </header>

  <main class="main site-shell onboarding-shell">
    <section class="card">
      <p class="tiny">&gt; onboarding</p>
      <h1 class="terminal-title">首次配置</h1>
      <p class="muted">填写一次后即可按计划推送内容，保存后自动跳转到今日学习页。</p>

      <form id="onboarding-form">
        <div class="field">
          <label class="label" for="email">接收邮箱</label>
          <input class="input" id="email" type="email" required placeholder="例如：name@example.com">
        </div>

        <div class="field">
          <label class="label" for="custom-topic">自定义主题（可选）</label>
          <textarea class="textarea" id="custom-topic" placeholder="例如：AI 产品、行业研究、雅思写作"></textarea>
        </div>

        <div class="field">
          <span class="label">学习类型（可多选）</span>
          <div id="type-choices" class="chip-row">
            <button class="chip" type="button" data-type="spoken">英语口语</button>
            <button class="chip" type="button" data-type="vocabulary">英语单词</button>
            <button class="chip" type="button" data-type="finance">财经新闻</button>
            <button class="chip" type="button" data-type="custom">自定义主题</button>
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="label" for="daily-count">每日条数</label>
            <select class="select" id="daily-count">
              <option value="2">2 条</option>
              <option value="3" selected>3 条</option>
              <option value="4">4 条</option>
              <option value="5">5 条</option>
              <option value="6">6 条</option>
            </select>
          </div>
          <div class="field">
            <label class="label" for="send-time">每日发送时间</label>
            <input class="input" id="send-time" type="time" value="07:30">
          </div>
        </div>

        <div class="grid-2">
          <div class="field">
            <label class="label" for="review-time">晚间复习时间</label>
            <input class="input" id="review-time" type="time" value="20:30">
          </div>
          <div class="field">
            <label class="label" for="review-enabled">是否开启晚间复习</label>
            <select class="select" id="review-enabled">
              <option value="true" selected>开启</option>
              <option value="false">关闭</option>
            </select>
          </div>
        </div>

        <button class="btn" type="submit"><span>保存并进入今日学习</span></button>
      </form>
    </section>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/onboarding.js"></script>
</body>
</html>
